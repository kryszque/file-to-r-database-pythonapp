<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Data Import</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">Data Import Site</h2>
            </div>
            <div class="card-body">
                <p>Point location of data files in order to start import.</p>

                <form method="post" class="mt-4">
                    {% csrf_token %} <div class="mb-3">
                        {{ form.directory_path.label_tag }}
                        {{ form.directory_path }}
                    </div>
                    <button type="submit" class="btn btn-success">Start import</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
